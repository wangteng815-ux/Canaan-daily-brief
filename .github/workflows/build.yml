name: Build daily intel site

on:
  schedule:
    # 每天 UTC 02:00 = 北京时间 10:00
    - cron: "0 2 * * *"
    # 每天 UTC 14:00 = 北京时间 22:00
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site
        run: python build.py

      - name: Commit docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com]"
          git add docs/
          git commit -m "auto update ($(date -u))" || echo "No changes"
          git push
