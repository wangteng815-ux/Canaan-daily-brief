  # ====== Google News RSS (keyword nets) ======
  # Tip: keep spaces as '+'. Keep it broad to catch “utilization / wafer price / pull-in orders / N2/N3 / CoWoS”
  - name: "GNews - Foundry Utilization & Capacity"
    url: "https://news.google.com/rss/search?q=(TSMC+OR+Samsung+Foundry+OR+Intel+Foundry+OR+SMIC+OR+UMC+OR+GlobalFoundries+OR+Tower)+(utilization+OR+capacity+OR+lead+time+OR+allocation+OR+pull-in+orders)+when:7d&hl=en-US&gl=US&ceid=US:en"
    tags: ["foundry", "utilization", "capacity"]

  - name: "GNews - Wafer Price / ASP / Surcharge"
    url: "https://news.google.com/rss/search?q=(wafer+price+OR+foundry+price+OR+ASP+OR+surcharge)+(8-inch+OR+12-inch+OR+mature+node+OR+N3+OR+N2)+when:14d&hl=en-US&gl=US&ceid=US:en"
    tags: ["foundry", "price"]

  - name: "GNews - MediaTek / Big customers new projects"
