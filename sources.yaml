  # ====== Foundry / Supply chain (high-signal) ======
  - name: "TrendForce - Semiconductors"
    url: "https://www.trendforce.com/feed/Semiconductors.html"
    tags: ["foundry", "price", "utilization", "supplychain"]

  # ====== EDA (simple) ======
