timezone: Asia/Tokyo

display:
  max_items_per_section: 10
  lookback_days: 7

# ====== Filters ======
filter:
  # 域名黑名单：常见“必须订阅/注册/付费”媒体 + 你明确不想要的股票站
  blocked_domains:
    - digitimes.com
    - www.digitimes.com
    - wsj.com
    - www.wsj.com
    - bloomberg.com
    - www.bloomberg.com
    - ft.com
    - www.ft.com
    - nikkei.com
    - www.nikkei.com
    - asia.nikkei.com
    - economist.com
    - www.economist.com
    - aol.com
    - www.aol.com
    - adhocnews.de
    - www.adhocnews.de

  # 标题/摘要关键词黑名单（大小写不敏感）
  blocked_keywords:
    # 驱动/固件/版本更新噪音
    - "driver update"
    - "drivers"
    - "adrenalin"
    - "radeon software"
    - "firmware update"
    - "security update"
    - "patch tuesday"
    - "release notes"
    - "版本更新"
    - "驱动更新"
    - "固件更新"
    - "升级补丁"

    # 股票/投研噪音
    - "stocks"
    - "should you buy"
    - "is it too late to buy"
    - "before they skyrocket"
    - "price target"
    - "analyst says buy"
    - "strong buy rating"
    - "top nasdaq stocks"
    - "growth stocks to buy"
    - "best stocks for"
    - "undervalued stock"
    - "market cap"
    - "shares surged"
    - "stock pops"
    - "downgrade"
    - "upgrade"

  # 如果标题/摘要出现这些词，基本可判断是订阅墙/注册墙提示，直接过滤
  paywall_keywords:
    - "subscribe"
    - "subscription"
    - "sign in to continue"
    - "register to read"
    - "to continue reading"
    - "join now"
    - "登录后查看"
    - "订阅后查看"
    - "注册后查看"

